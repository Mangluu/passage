name: Refresh live signals

# Rebuilds src/data/signals.json — US State Dept travel-advisory levels for every
# country plus recent news for the curated set. These change daily, so we refresh
# nightly. Keyless, backend-free: the Action fetches and commits; nothing is
# fetched in the user's browser.
on:
  schedule:
    - cron: '17 5 * * *' # daily ~05:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/fetch-signals.mjs
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain src/data/signals.json)" ]; then
            git config user.name "passage-bot"
            git config user.email "actions@users.noreply.github.com"
            git add src/data/signals.json
            git commit -m "chore: refresh live signals"
            git push
          else
            echo "no changes"
          fi
